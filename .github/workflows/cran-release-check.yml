name: CRAN-release-check

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  require-prerequisite-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Require develop branch
        if: ${{ github.ref != 'refs/heads/develop' }}
        run: |
          echo "CRAN-release-check can only be dispatched from develop."
          echo "Current ref: $GITHUB_REF"
          exit 1

      - name: Require successful prerequisite workflows
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const requiredWorkflows = [
              {
                workflow_id: 'r-cmd-check.yaml',
                label: 'R-CMD-check'
              },
              {
                workflow_id: 'postgresql-test.yml',
                label: 'R Package Tests (PostgreSQL)'
              },
              {
                workflow_id: 'databricks-test.yml',
                label: 'R Package Tests (Spark Databricks)'
              },
              {
                workflow_id: 'sqlserver-test.yml',
                label: 'R Package Tests (SQL Server)'
              }
            ];

            for (const workflow of requiredWorkflows) {
              const runs = await github.paginate(
                github.rest.actions.listWorkflowRuns,
                {
                  owner,
                  repo,
                  workflow_id: workflow.workflow_id,
                  branch: 'develop',
                  head_sha: context.sha,
                  status: 'completed',
                  per_page: 100
                }
              );

              const successfulRun = runs
                .filter((run) => run.conclusion === 'success')
                .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))[0];

              if (!successfulRun) {
                core.setFailed(
                  `No successful completed ${workflow.label} run was found for develop at ${context.sha}.`
                );
                return;
              }

              core.info(`Found successful ${workflow.label} run: ${successfulRun.html_url}`);
            }

  cran-checks:
    needs: require-prerequisite-checks
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::urlchecker
            any::remotes
            any::usethis
            any::spelling
          needs: check

      - name: Install revdepcheck
        run: Rscript -e "remotes::install_github('r-lib/revdepcheck')"

      - name: Spell Check
        run: Rscript -e "devtools::spell_check()"

      - name: Check URLs
        run: Rscript -e "urlchecker::url_check()"

      - name: Devtools Check (Remote and Manual)
        run: Rscript -e "devtools::check(remote = TRUE, manual = TRUE)"

      - name: Reverse Dependency Check
        run: Rscript -e "revdepcheck::revdep_check(num_workers = 4)"

      - name: Check Package Size
        run: |
          R CMD build .
          TARBALL=$(ls *.tar.gz)
          SIZE=$(stat -c%s "$TARBALL")
          echo "Tarball size: $SIZE bytes"
          if [ $SIZE -gt 5242880 ]; then
            echo "Error: Package tarball exceeds the 5MB CRAN limit."
            exit 1
          fi
          echo "Package size is within CRAN limits."

      - name: Initialize/Update CRAN Comments
        run: |
          Rscript -e "usethis::use_cran_comments()"
          echo -e "\n## Automated GitHub Actions ($(date +'%Y-%m-%d'))" >> cran-comments.md
          echo "- devtools::spell_check() passed" >> cran-comments.md
          echo "- urlchecker::url_check() passed" >> cran-comments.md
          echo "- devtools::check(remote = TRUE, manual = TRUE) passed" >> cran-comments.md
          echo "- revdepcheck::revdep_check() completed" >> cran-comments.md
          echo "- Package size verified < 5MB" >> cran-comments.md

      - name: Upload CRAN Comments
        uses: actions/upload-artifact@v4
        with:
          name: cran-comments
          path: cran-comments.md
