name: Push to Public Repo

on:
  pull_request:
    branches: [main]
    types:
      - closed

permissions:
  actions: read
  contents: read

jobs:
  require-cran-release-check:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    outputs:
      cran-release-check-run-id: ${{ steps.check-cran.outputs.run-id }}
    steps:
      - name: Require successful CRAN-release-check on develop
        id: check-cran
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            if (`${owner}/${repo}` !== 'darwin-eu-dev/TestGenerator') {
              core.setFailed(
                `Push to public can only run from darwin-eu-dev/TestGenerator. Current repository: ${owner}/${repo}.`
              );
              return;
            }

            if (pr.head.repo.full_name !== `${owner}/${repo}` || pr.head.ref !== 'develop') {
              core.setFailed(
                `Push to public requires a merged PR from ${owner}/${repo}:develop into main. Found ${pr.head.repo.full_name}:${pr.head.ref}.`
              );
              return;
            }

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner,
                repo,
                workflow_id: 'cran-release-check.yml',
                branch: 'develop',
                head_sha: pr.head.sha,
                status: 'completed',
                per_page: 100
              }
            );

            const successfulRun = runs
              .filter((run) => run.conclusion === 'success')
              .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))[0];

            if (!successfulRun) {
              core.setFailed(
                `No successful completed cran-release-check.yml run was found on develop for ${pr.head.sha}.`
              );
              return;
            }

            core.setOutput('run-id', successfulRun.id);
            core.info(`Found successful cran-release-check.yml run: ${successfulRun.html_url}`);

  deploy:
    needs: require-cran-release-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Push to Public Repository
        env:
          API_TOKEN_GITHUB: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          if [ -z "${API_TOKEN_GITHUB}" ]; then
            echo "PUBLIC_REPO_TOKEN secret is not set"
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git rm -f --ignore-unmatch \
            .github/workflows/cran-release-check.yml \
            .github/workflows/rhub.yaml \
            .github/workflows/push-to-public.yml \
            vignettes/CRAN-CI-WORKFLOW.Rmd \
            vignettes/CRAN-CI-WORKFLOW.md
          sed -i '/      - CRAN-CI-WORKFLOW/d' _pkgdown.yml
          git add _pkgdown.yml
          git commit -m "chore: prepare public release" \
            -m "Source-Repository: darwin-eu-dev/TestGenerator" \
            -m "Source-Branch: develop"

          # Add the remote using the PAT for HTTPS authentication
          git remote add public https://x-access-token:${API_TOKEN_GITHUB}@github.com/darwin-eu/TestGenerator.git

          # Pushes the main branch to the public repo
          git push public HEAD:main --force
