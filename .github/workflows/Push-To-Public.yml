name: Push to Public Repo

on:
  workflow_run:
    workflows: ["CRAN-release-check"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Public Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Replace 'username/public-repo-name' with your actual public repo details
          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/darwin-eu/TestGenerator.git

          # Pushes the main branch to the public repo
          git push public HEAD:main --force
